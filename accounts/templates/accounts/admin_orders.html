<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <title>Zarządzanie zamówieniami</title>

    <link
        href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
        rel="stylesheet"
    >
</head>

<body class="bg-light">

<div class="container mt-5">

    <div class="d-flex justify-content-between align-items-center mb-4">

        <h1>🛒 Zarządzanie zamówieniami</h1>

        <a
            href="/admin-panel/"
            class="btn btn-secondary"
        >
            ← Powrót do panelu
        </a>

    </div>

    <div class="card shadow">

        <div class="card-body">

            <table class="table table-hover">

                <thead class="table-dark">

                    <tr>

                        <th>ID</th>
                        <th>Klient</th>
                        <th>Data</th>
                        <th>Status</th>
                        <th>Kwota</th>
                        <th>Akcja</th>

                    </tr>

                </thead>

                <tbody>

                {% for order in orders %}

                    <tr>

                        <td>
                            #{{ order.id }}
                        </td>

                        <td>
                            {{ order.customer.username }}
                        </td>

                        <td>
                            {{ order.created_at|date:"d.m.Y H:i" }}
                        </td>

                        <td>

                            <form
                                method="post"
                                action="/admin-orders/{{ order.id }}/status/"
                            >

                                {% csrf_token %}

                                <select
                                    name="status"
                                    class="form-select"
                                >

                                    <option value="new"
                                        {% if order.status == 'new' %}
                                        selected
                                        {% endif %}
                                    >
                                        Nowe
                                    </option>

                                    <option value="processing"
                                        {% if order.status == 'processing' %}
                                        selected
                                        {% endif %}
                                    >
                                        W realizacji
                                    </option>

                                    <option value="shipped"
                                        {% if order.status == 'shipped' %}
                                        selected
                                        {% endif %}
                                    >
                                        Wysłane
                                    </option>

                                    <option value="completed"
                                        {% if order.status == 'completed' %}
                                        selected
                                        {% endif %}
                                    >
                                        Zakończone
                                    </option>

                                    <option value="cancelled"
                                        {% if order.status == 'cancelled' %}
                                        selected
                                        {% endif %}
                                    >
                                        Anulowane
                                    </option>

                                </select>

                        </td>

                        <td>

                            {{ order.total }} zł

                        </td>

                        <td>

                                <button
                                    type="submit"
                                    class="btn btn-success btn-sm"
                                >
                                    Zapisz
                                </button>

                            </form>

                        </td>

                    </tr>

                {% empty %}

                    <tr>

                        <td colspan="6">

                            Brak zamówień.

                        </td>

                    </tr>

                {% endfor %}

                </tbody>

            </table>

        </div>

    </div>

</div>

</body>
</html>
