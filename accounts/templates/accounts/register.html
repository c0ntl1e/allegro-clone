<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">

    <meta name="viewport"
          content="width=device-width, initial-scale=1.0">

    <title>Rejestracja firmy</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
          rel="stylesheet">
</head>

<body class="bg-light">

<div class="container mt-5">

    <div class="row justify-content-center">

        <div class="col-md-7">

            <div class="card shadow border-0 rounded-4">

                <div class="card-body p-5">

                    <h1 class="mb-4 text-center">
                        🏢 Rejestracja firmy
                    </h1>

                    <form method="post">

                        {% csrf_token %}

                        <!-- Username -->
                        <div class="mb-3">
                            <label class="form-label">
                                Nazwa użytkownika
                            </label>

                            {{ form.username }}
                        </div>

                        <!-- Email -->
                        <div class="mb-3">
                            <label class="form-label">
                                Email
                            </label>

                            {{ form.email }}
                        </div>

                        <!-- Password -->
                        <div class="mb-3">
                            <label class="form-label">
                                Hasło
                            </label>

                            {{ form.password }}
                        </div>

                        <!-- NIP -->
                        <div class="mb-3">

                            <label class="form-label">
                                NIP
                            </label>

                            <div class="d-flex gap-2">

                                {{ form.nip }}

                                <button
                                    type="button"
                                    class="btn btn-warning"
                                    onclick="loadCompanyData()">

                                    Pobierz dane firmy

                                </button>

                            </div>

                        </div>

                        <!-- Company name -->
                        <div class="mb-3">

                            <label class="form-label">
                                Nazwa firmy
                            </label>

                            {{ form.company_name }}

                        </div>

                        <!-- REGON -->
                        <div class="mb-3">

                            <label class="form-label">
                                REGON
                            </label>

                            {{ form.regon }}

                        </div>

                        <!-- Address -->
                        <div class="mb-3">

                            <label class="form-label">
                                Adres
                            </label>

                            {{ form.address }}

                        </div>

                        <button
                            type="submit"
                            class="btn btn-dark w-100">

                            Zarejestruj firmę

                        </button>

                    </form>

                </div>

            </div>

        </div>

    </div>

</div>

<script>

async function loadCompanyData() {

    const nip = document.getElementById('id_nip').value;

    if (!nip) {
        alert('Wpisz NIP');
        return;
    }

    try {

        const response = await fetch(
            `/api/company-data/?nip=${nip}`
        );

        const data = await response.json();

        console.log(data);

        // Если ошибка
        if (data.error) {

            alert(data.error);

            return;
        }

        // Автозаполнение полей
        document.getElementById('id_company_name').value =
            data.name || '';

        document.getElementById('id_regon').value =
            data.regon || '';

        document.getElementById('id_address').value =
            data.address || '';

    } catch (error) {

        console.error(error);

        alert('Nie udało się pobrać danych firmy.');

    }

}

</script>

</body>
</html>
