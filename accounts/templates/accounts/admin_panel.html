<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">

    <title>Panel Administratora</title>

    <link
        href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
        rel="stylesheet"
    >
</head>

<body class="bg-light">

<div class="container mt-5">

    <h1 class="mb-4">
        🛠 Panel Administratora
    </h1>

    <div class="row g-4">

        <div class="col-md-4">

            <div class="card shadow-sm">

                <div class="card-body">

                    <h3>
                        👥 Użytkownicy
                    </h3>

                    <p>
                        Liczba użytkowników:
                        <strong>{{ users_count }}</strong>
                    </p>

                    <a
                        href="/admin-users/"
                        class="btn btn-primary"
                    >
                        Zarządzaj użytkownikami
                    </a>

                </div>

            </div>

        </div>

        <div class="col-md-4">

            <div class="card shadow-sm">

                <div class="card-body">

                    <h3>
                        📦 Produkty
                    </h3>

                    <p>
                        Zarządzanie wszystkimi ogłoszeniami
                    </p>

                    <a
                        href="/admin-products/"
                        class="btn btn-warning"
                    >
                        Zarządzaj produktami
                    </a>

                </div>

            </div>

        </div>

        <div class="col-md-4">

            <div class="card shadow-sm">

                <div class="card-body">

                    <h3>
                        🛒 Zamówienia
                    </h3>

                    <p>
                        Wszystkie zamówienia w systemie
                    </p>

                    <button
                        class="btn btn-secondary"
                        disabled
                    >
                        Wkrótce
                    </button>

                </div>

            </div>

        </div>

        <div class="col-md-4">

            <div class="card shadow-sm">

                <div class="card-body">

                    <h3>
                        💬 Wiadomości
                    </h3>

                    <p>
                        System wiadomości między kontami
                    </p>

                    <button
                        class="btn btn-secondary"
                        disabled
                    >
                        Wkrótce
                    </button>

                </div>

            </div>

        </div>

    </div>

</div>

</body>
</html>
