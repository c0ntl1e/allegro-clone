<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">

    <title>Rozmowa</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
          rel="stylesheet">
</head>

<body class="bg-light">

<div class="container mt-5">

    <div class="d-flex justify-content-between mb-4">

        <h1>
            💬 {{ other_user.username }}
        </h1>

        <a
            href="/messages/"
            class="btn btn-secondary"
        >
            Powrót
        </a>

    </div>

    <div class="card">

        <div class="card-body">

            {% for message in messages %}

                <div class="mb-3">

                    <strong>
                        {{ message.sender.username }}
                    </strong>

                    <small class="text-muted">
                        {{ message.created_at }}
                    </small>

                    <div class="border rounded p-2 mt-1">

                        {{ message.content }}

                    </div>

                </div>

            {% empty %}

                <p>
                    Brak wiadomości.
                </p>

            {% endfor %}

        </div>

    </div>

    <div class="card mt-3">

        <div class="card-body">

            <form
                method="post"
                action="/messages/{{ other_user.id }}/send/"
            >

                {% csrf_token %}

                <textarea
                    name="content"
                    class="form-control mb-3"
                    rows="4"
                    placeholder="Napisz wiadomość..."
                ></textarea>

                <button
                    type="submit"
                    class="btn btn-primary"
                >
                    Wyślij
                </button>

            </form>

        </div>

    </div>

</div>

</body>
</html>
