<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Zamówienie zostało złożone</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
          rel="stylesheet">
</head>
<body class="bg-light">

<div class="container mt-5">
    <div class="card shadow-lg border-0 rounded-4">
        <div class="card-body p-5 text-center">

            <h1 class="text-success mb-4">
                ✅ Zamówienie zostało złożone!
            </h1>

            <p class="lead">
                Numer zamówienia:
                <strong>#{{ order.id }}</strong>
            </p>

            <p class="lead">
                Łączna kwota:
                <strong>{{ order.total }} zł</strong>
            </p>

            <p class="text-muted">
                Dziękujemy za zakupy w naszym marketplace.
            </p>

            <div class="mt-4">
                <a href="/products/" class="btn btn-warning btn-lg">
                    Powrót do katalogu
                </a>
            </div>

        </div>
    </div>
</div>

</body>
</html>
